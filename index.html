<!DOCTYPE html>
<html lang="en" class="styled">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kartik Gupta - Backend Developer specializing in scalable systems, cloud architecture, and high-performance APIs on AWS." />
  <meta name="keywords" content="Kartik Gupta, Backend Developer, Cloud Architect, AWS, PHP, Laravel, Python, Node.js, API Development, Portfolio" />
  <meta name="author" content="Kartik Gupta" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#a855f7" />
  <link rel="canonical" href="https://kartikgupta.in/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kartikgupta.in/" />
  <meta property="og:title" content="Kartik Gupta | Backend Engineer & Cloud Architect" />
  <meta property="og:description" content="Backend Developer specializing in scalable systems, cloud architecture, and high-performance APIs. Explore my projects and experience." />
  <meta property="og:image" content="https://kartikgupta.in/assets/images/profile.jpg" />
  <meta property="og:site_name" content="Kartik Gupta Portfolio" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://kartikgupta.in/" />
  <meta name="twitter:title" content="Kartik Gupta | Backend Engineer & Cloud Architect" />
  <meta name="twitter:description" content="Backend Developer specializing in scalable systems, cloud architecture, and high-performance APIs." />
  <meta name="twitter:image" content="https://kartikgupta.in/assets/images/profile.jpg" />

  <!-- Security Headers (applied via .htaccess HTTP headers on server) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

  <title>Kartik Gupta | Backend Engineer & Cloud Architect</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon" />
  <link rel="apple-touch-icon" href="assets/images/profile.jpg" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Kartik Gupta",
    "url": "https://kartikgupta.in",
    "image": "https://kartikgupta.in/assets/images/profile.jpg",
    "jobTitle": "Backend Engineer & Cloud Architect",
    "description": "Backend Developer specializing in scalable systems, cloud architecture, and high-performance APIs.",
    "knowsAbout": ["PHP", "Laravel", "Node.js", "Fastify", "Python", "AWS", "Docker", "Redis", "DynamoDB", "MariaDB", "RabbitMQ", "REST APIs", "Microservices", "Cloud Architecture"],
    "sameAs": [
      "https://github.com/kg-0805",
      "https://linkedin.com/in/kg-0805"
    ],
    "worksFor": {
      "@type": "Organization",
      "name": "Digital India Corporation"
    }
  }
  </script>
  <!-- Apply saved/system theme before paint to avoid a flash of the wrong theme -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { /* localStorage unavailable; default to light */ }
    })();
  </script>
  <script src="js/tailwind.min.js"></script>
  <script>
    if (typeof tailwind !== 'undefined') {
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            maxWidth: {
              'container': '1280px'
            }
          }
        }
      }
    }
  </script>
  <script src="js/lucide.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Reveal page once styles are loaded -->
  <style>
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }
  </style>
  <script>
    // Ensure page is visible (no-op if already styled)
    document.documentElement.classList.add('styled');
  </script>
</head>
<body id="root" class="flex flex-col min-h-screen theme-transition">

  <!-- Skip to main content link for accessibility -->
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-[100] focus:px-4 focus:py-2 focus:bg-purple-600 focus:text-white focus:rounded-lg">
    Skip to main content
  </a>

  <!-- Floating Pill Navigation -->
  <nav role="navigation" aria-label="Main navigation" class="nav-floating">
    <div class="flex items-center gap-1 sm:gap-2">

      <!-- Logo Section -->
      <a href="#home" data-section="home" aria-label="Kartik Gupta - Go to home" class="nav-logo flex items-center gap-2 px-2 py-1 rounded-full no-underline hover:no-underline text-gray-900 mr-2">
        <img src="assets/images/logo.png" alt="Kartik Gupta logo" class="h-8 w-8 rounded-full object-cover ring-2 ring-purple-500/30" />
        <span class="text-sm font-bold hidden sm:inline gradient-text">Kartik Gupta</span>
      </a>

      <!-- Navigation Links -->
      <div class="nav-menu flex items-center gap-0.5 sm:gap-1">
        <a href="#home"
           data-section="home"
           aria-current="page"
           class="nav-link min-w-[44px] min-h-[44px] flex items-center justify-center px-3 py-2 rounded-full text-sm font-medium text-gray-700 hover:text-purple-600 hover:bg-purple-50 transition-all focus-visible:outline-2 focus-visible:outline-purple-500 focus-visible:outline-offset-2">
          Home
        </a>
        <a href="#about"
           data-section="about"
           class="nav-link min-w-[44px] min-h-[44px] flex items-center justify-center px-3 py-2 rounded-full text-sm font-medium text-gray-700 hover:text-purple-600 hover:bg-purple-50 transition-all focus-visible:outline-2 focus-visible:outline-purple-500 focus-visible:outline-offset-2">
          About
        </a>
        <a href="#projects"
           data-section="projects"
           class="nav-link min-w-[44px] min-h-[44px] flex items-center justify-center px-3 py-2 rounded-full text-sm font-medium text-gray-700 hover:text-purple-600 hover:bg-purple-50 transition-all focus-visible:outline-2 focus-visible:outline-purple-500 focus-visible:outline-offset-2">
          Projects
        </a>
        <a href="#contact"
           data-section="contact"
           class="nav-link min-w-[44px] min-h-[44px] flex items-center justify-center px-3 py-2 rounded-full text-sm font-medium text-gray-700 hover:text-purple-600 hover:bg-purple-50 transition-all focus-visible:outline-2 focus-visible:outline-purple-500 focus-visible:outline-offset-2">
          Contact
        </a>

        <!-- Theme toggle (light/dark). Icons are swapped via CSS based on the
             `dark` class on <html>; no JS icon rebuild needed. -->
        <button id="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false"
           class="theme-toggle nav-link min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full text-gray-700 hover:text-purple-600 hover:bg-purple-50 transition-all focus-visible:outline-2 focus-visible:outline-purple-500 focus-visible:outline-offset-2">
          <svg class="theme-icon-moon w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          <svg class="theme-icon-sun w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </button>
      </div>

    </div>
  </nav>

  <!-- Main Content -->
  <main id="main-content" role="main" class="flex-grow max-w-[1280px] w-full mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-8">

    <!-- Loading Indicator (shown during initialization) -->
    <div id="loading-indicator" class="loading-container" aria-live="polite" aria-label="Loading portfolio content">
      <div class="text-center">
        <div class="loading-spinner" role="status">
          <span class="sr-only">Loading...</span>
        </div>
        <p class="mt-4 text-gray-500">Loading portfolio...</p>
      </div>
    </div>

    <!-- Section Containers -->
    <section id="home" class="scroll-section" aria-label="Home"></section>
    <section id="stats" class="scroll-section" aria-label="Stats"></section>
    <section id="about" class="scroll-section" aria-label="About"></section>
    <section id="projects" class="scroll-section" aria-label="Projects"></section>
    <section id="contact" class="scroll-section" aria-label="Contact"></section>

    <!-- ARIA Live Region for section change announcements -->
    <div id="section-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  </main>

  <!-- Modal Container (populated dynamically by modal.js) -->
  <div id="modal-container" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-label="Project details"></div>

  <!-- Scripts loaded in dependency order -->
  <script src="js/data-manager.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/router.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>

  <!-- SEO: Minimal fallback for crawlers / no-JS visitors. All portfolio data
       (projects, skills, experience, stats) is rendered from the JSON files via JS. -->
  <noscript>
    <div style="max-width:1280px;margin:0 auto;padding:2rem;">
      <h1>Kartik Gupta - Backend Engineer & Cloud Architect</h1>
      <p>This portfolio loads its content with JavaScript. Please enable JavaScript to view projects, skills, and experience.</p>
      <h2>Contact</h2>
      <p>Email: <a href="mailto:contact@kartikgupta.in">contact@kartikgupta.in</a></p>
      <p>GitHub: <a href="https://github.com/kg-0805">github.com/kg-0805</a></p>
      <p>LinkedIn: <a href="https://linkedin.com/in/kg-0805">linkedin.com/in/kg-0805</a></p>
    </div>
  </noscript>

  <!-- Prevent right-click on images -->
  <script>
    document.addEventListener('contextmenu', function(e) {
      if (e.target.tagName === 'IMG') { e.preventDefault(); }
    });
  </script>

</body>
</html>
